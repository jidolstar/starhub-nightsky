<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Skymap Tile Viewer (8x4 Grid Check)</title>
    <style>
        body {
            background: #111;
            color: #eee;
            font-family: sans-serif;
            margin: 20px;
        }
        h1 { font-size: 20px; text-align: center; color: #4af; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(8, 200px);
            grid-template-rows: repeat(4, 200px);
            gap: 2px;
            justify-content: center;
            background: #333;
            padding: 5px;
            width: fit-content;
            margin: 0 auto;
        }
        .tile-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            overflow: hidden;
            border: 1px solid #555;
        }
        .tile-wrapper img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }
        .label {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 2px 5px;
            font-size: 11px;
            pointer-events: none;
        }
        .info {
            text-align: center;
            margin-top: 20px;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Skymap Tile Viewer (8x4 Grid)</h1>
    <div id="grid" class="grid-container"></div>
    <div class="info">
        가로: 8개 (RA 0h ~ 24h) / 세로: 4개 (Dec 90 ~ -90)<br>
        파일명 규칙: assets/skymap/z1/skymap_z1_{row}_{col}.png
    </div>

    <script>
        const grid = document.getElementById('grid');
        const rows = 4;
        const cols = 8;
        const basePath = './assets/skymap/z1/skymap_z1_';

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'tile-wrapper';

                const img = document.createElement('img');
                img.src = `${basePath}${r}_${c}.png`;
                
                const label = document.createElement('div');
                label.className = 'label';
                label.textContent = `[${r}, ${c}]`;

                wrapper.appendChild(img);
                wrapper.appendChild(label);
                grid.appendChild(wrapper);
            }
        }
    </script>
</body>
</html>
